<nav class="bg-gradient-to-r from-blue-600 to-blue-800 shadow-lg fixed w-full top-0 z-50">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <span class="text-2xl">💊</span>
        <span class="ml-2 text-xl font-bold text-white">MediShop</span>
      </div>

      <!-- Search Bar -->
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (input)="onSearch()"
            placeholder="Search medicines..."
            class="w-full px-4 py-2 pl-10 rounded-full border-none focus:outline-none focus:ring-2 focus:ring-blue-300"
          />
          <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
        </div>
      </div>

      <!-- Right Side Icons -->
      <div class="flex items-center space-x-4">
        <!-- Cart Icon -->
        <button class="text-white hover:text-blue-200 relative">
          <span class="text-2xl">🛒</span>
          <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
            3
          </span>
        </button>

        <!-- User Icon -->
        <div class="relative">
          <button
            (click)="toggleUserMenu()"
            class="flex items-center space-x-2 text-white hover:text-blue-200 focus:outline-none"
          >
            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
              <span *ngIf="!isLoggedIn" class="text-2xl">👤</span>
              <span *ngIf="isLoggedIn" class="text-blue-600 font-bold">
                {{ currentUser?.name?.charAt(0)?.toUpperCase() }}
              </span>
            </div>
          </button>

          <!-- User Dropdown Menu -->
          <div
            *ngIf="showUserMenu"
            class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl py-2 z-50"
          >
            <div *ngIf="!isLoggedIn">
              <button
                (click)="openLoginPopup()"
                class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 hover:text-blue-600"
              >
                🔐 Login
              </button>
              <button
                (click)="openSignupPopup()"
                class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 hover:text-blue-600"
              >
                📝 Sign Up
              </button>
            </div>
            <div *ngIf="isLoggedIn">
              <div class="px-4 py-2 border-b">
                <p class="font-semibold text-gray-800">{{ currentUser?.name }}</p>
                <p class="text-sm text-gray-500">{{ currentUser?.email }}</p>
              </div>
              <button class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 hover:text-blue-600">
                👤 Profile
              </button>
              <button class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 hover:text-blue-600">
                📦 Orders
              </button>
              <button class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 hover:text-blue-600">
                ❤️ Wishlist
              </button>
              <hr class="my-1" />
              <button
                (click)="logout()"
                class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50"
              >
                🚪 Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
