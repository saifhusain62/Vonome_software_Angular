<nav class="bg-white shadow-lg fixed w-full top-0 z-50">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <a 
          routerLink="/" 
          class="flex items-center cursor-pointer hover:opacity-80 transition-opacity"
          (click)="navigateToHome()"
        >
          <i class="fa-solid fa-capsules text-2xl" style="color: #1eba9b;"></i>
          <span class="ml-2 text-xl font-bold" style="color: #1eba9b;">MediShop</span>
        </a>
      </div>

      <!-- Search Bar -->
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (input)="onSearch()"
            placeholder="Search medicines..."
            class="w-full px-4 py-2 pl-10 rounded-md focus:outline-none"
            style="border: 2px solid #1eba9b;"
          />
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3" style="color: #1eba9b;"></i>
        </div>
      </div>

      <!-- Right Side Icons -->
      <div class="flex items-center space-x-4">

          <i class="fa-solid fa-cart-shopping text-2xl"></i>
          <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">

        <!-- User Icon -->
   <!-- User Icon -->
<div class="relative">
  <button
    (click)="toggleUserMenu()"
    class="flex items-center space-x-2 hover:opacity-80 focus:outline-none"
    style="color: #1eba9b;"
  >
    <div class="w-10 h-10 rounded-full flex items-center justify-center overflow-hidden" 
         style="background-color: #1eba9b;">
      <img
        *ngIf="isLoggedIn && currentUser?.profilePicture"
        [src]="getProfilePictureUrl()"
        [alt]="currentUser?.name"
        class="w-full h-full object-cover"
        (error)="$event.target.src='assets/default-avatar.png'"
      />
      <i *ngIf="!isLoggedIn || !currentUser?.profilePicture" 
         class="fa-solid fa-user text-white text-xl"></i>
    </div>
  </button>

  <!-- User Dropdown Menu -->
  <div
    *ngIf="showUserMenu"
    class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl py-2 z-50"
    style="border: 1px solid #1eba9b;"
  >
    <div *ngIf="!isLoggedIn">
      <button
        (click)="openLoginPopup()"
        class="w-full text-left px-4 py-2 text-gray-700 hover:text-white"
        style="--hover-bg: #1eba9b;"
        [ngStyle]="{'hover-background-color': '#1eba9b'}"
        onmouseover="this.style.backgroundColor='#e6f9f5'; this.style.color='#1eba9b'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#374151'"
      >
        <i class="fa-solid fa-lock mr-2"></i> Login
      </button>
      <button
        (click)="openSignupPopup()"
        class="w-full text-left px-4 py-2 text-gray-700"
        onmouseover="this.style.backgroundColor='#e6f9f5'; this.style.color='#1eba9b'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#374151'"
      >
        <i class="fa-solid fa-user-plus mr-2"></i> Sign Up
      </button>
    </div>
    <div *ngIf="isLoggedIn">
      <div class="px-4 py-3 border-b" style="border-color: #1eba9b;">
        <div class="flex items-center space-x-3">
          <img
            *ngIf="currentUser?.profilePicture"
            [src]="getProfilePictureUrl()"
            [alt]="currentUser?.name"
            class="w-12 h-12 rounded-full object-cover"
            (error)="$event.target.src='assets/default-avatar.png'"
          />
          <div
            *ngIf="!currentUser?.profilePicture"
            class="w-12 h-12 rounded-full flex items-center justify-center"
            style="background-color: #1eba9b;"
          >
            <span class="text-white font-bold text-lg">
              {{ getUserInitial() }}
            </span>
          </div>
          <div>
            <p class="font-semibold text-gray-800">{{ currentUser?.name }}</p>
            <p class="text-sm text-gray-500">{{ currentUser?.email }}</p>
          </div>
        </div>
      </div>
      <button
        class="w-full text-left px-4 py-2 text-gray-700"
        onmouseover="this.style.backgroundColor='#e6f9f5'; this.style.color='#1eba9b'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#374151'"
      >
        <i class="fa-solid fa-user mr-2"></i> Profile
      </button>
      <button
        class="w-full text-left px-4 py-2 text-gray-700"
        onmouseover="this.style.backgroundColor='#e6f9f5'; this.style.color='#1eba9b'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#374151'"
      >
        <i class="fa-solid fa-box mr-2"></i> Orders
      </button>
      <button
        class="w-full text-left px-4 py-2 text-gray-700"
        onmouseover="this.style.backgroundColor='#e6f9f5'; this.style.color='#1eba9b'"
        onmouseout="this.style.style.backgroundColor='transparent'; this.style.color='#374151'"
      >
        <i class="fa-solid fa-heart mr-2"></i> Wishlist
      </button>
      <hr class="my-1" style="border-color: #1eba9b;" />
      <button
        (click)="logout()"
        class="w-full text-left px-4 py-2 text-red-600"
        onmouseover="this.style.backgroundColor='#fef2f2'"
        onmouseout="this.style.backgroundColor='transparent'"
      >
        <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
      </button>
    </div>
  </div>
</div>
      </div>
    </div>
  </div>
</nav>
