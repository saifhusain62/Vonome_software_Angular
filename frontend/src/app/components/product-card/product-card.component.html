<div class="bg-white rounded-xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden group">
  <!-- Product Image -->
  <div class="relative h-40 bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center overflow-hidden">
    <img 
      [src]="product.image" 
      [alt]="product.name"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"
      (error)="onImageError($event)"
    />
    <!-- Discount Badge -->
    <div *ngIf="getDiscount() > 0" class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full">
      -{{ getDiscount() }}%
    </div>
    <!-- Stock Badge -->
    <div
      *ngIf="!product.inStock"
      class="absolute top-2 right-2 bg-gray-500 text-white text-xs font-bold px-2 py-1 rounded-full"
    >
      Out of Stock
    </div>
    <!-- Wishlist Button -->
    <button class="absolute top-2 right-2 w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center hover:bg-red-50 transition-colors" *ngIf="product.inStock">
      🤍
    </button>
  </div>

  <!-- Product Info -->
  <div class="p-4">
    <!-- Category -->
    <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded-full">
      {{ product.category }}
    </span>

    <!-- Name -->
    <h3 class="mt-2 font-semibold text-gray-800 text-sm line-clamp-2 h-10">
      {{ product.name }}
    </h3>

    <!-- Description -->
    <p class="text-xs text-gray-500 mt-1 line-clamp-2">
      {{ product.description }}
    </p>

    <!-- Rating -->
    <div class="flex items-center mt-2">
      <span class="text-sm">
        <span *ngFor="let star of getStars(product.rating)">{{ star }}</span>
      </span>
      <span class="text-xs text-gray-500 ml-2">
        {{ product.rating }} ({{ product.reviews }})
      </span>
    </div>

    <!-- Price -->
    <div class="mt-3 flex items-center justify-between">
      <div>
        <span class="text-lg font-bold text-blue-600">${{ product.price }}</span>
        <span *ngIf="product.originalPrice > product.price" class="text-sm text-gray-400 line-through ml-2">
          ${{ product.originalPrice }}
        </span>
      </div>
    </div>

    <!-- Add to Cart Button -->
    <button
      (click)="addToCart()"
      [disabled]="!product.inStock"
      [class]="product.inStock
        ? 'w-full mt-3 bg-gradient-to-r from-teal-500 to-teal-600 text-white py-2 rounded-lg font-medium hover:from-teal-600 hover:to-teal-700 transition-all flex items-center justify-center space-x-2 cursor-pointer shadow-md hover:shadow-lg'
        : 'w-full mt-3 bg-gray-300 text-gray-500 py-2 rounded-lg font-medium cursor-not-allowed flex items-center justify-center space-x-2'"
    >
      <svg *ngIf="product.inStock && !showAddedMessage" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" />
      </svg>
      <svg *ngIf="showAddedMessage" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
      </svg>
      <span>{{ showAddedMessage ? 'Added!' : (product.inStock ? 'Add to Cart' : 'Unavailable') }}</span>
    </button>
  </div>
</div>
