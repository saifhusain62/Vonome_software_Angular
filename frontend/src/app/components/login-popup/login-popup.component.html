<div *ngIf="showPopup" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-black bg-opacity-50 backdrop-blur-sm"
    (click)="closePopup()"
  ></div>

  <!-- Popup -->
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden animate-pulse">
    <!-- Header -->
    <div class="bg-gradient-to-r from-[#1eba9b] to-[#17a589] px-6 py-8 text-center">
      <span class="text-5xl">🔐</span>
      <h2 class="text-2xl font-bold text-white mt-4">Welcome Back!</h2>
      <p class="text-[#b8f0e6] mt-2">Login to your account</p>
    </div>

    <!-- Close Button -->
    <button
      (click)="closePopup()"
      class="absolute top-4 right-4 text-white hover:text-gray-200 text-2xl"
    >
      ✕
    </button>

    <!-- Form -->
    <div class="px-6 py-8">
      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
        {{ errorMessage }}
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">Email Address</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">📧</span>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="Enter your email"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1eba9b] focus:border-transparent"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-gray-700 font-medium mb-2">Password</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter your password"
            class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1eba9b] focus:border-transparent"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-3 text-gray-400 hover:text-gray-600"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Remember & Forgot -->
      <div class="flex justify-between items-center mb-6">
        <label class="flex items-center">
          <input type="checkbox" class="w-4 h-4 text-[#1eba9b] rounded" />
          <span class="ml-2 text-sm text-gray-600">Remember me</span>
        </label>
        <a href="#" class="text-sm text-[#1eba9b] hover:underline">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button
        (click)="onSubmit()"
        class="w-full bg-gradient-to-r from-[#1eba9b] to-[#17a589] text-white py-3 rounded-lg font-semibold hover:from-[#17a589] hover:to-[#148f7a] transition-all"
      >
        Login
      </button>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-4 text-gray-500 text-sm">OR</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Social Login -->
      <div class="flex space-x-4">
        <button class="flex-1 flex items-center justify-center space-x-2 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition-colors">
          <span>🔵</span>
          <span class="text-sm">Google</span>
        </button>
        <button class="flex-1 flex items-center justify-center space-x-2 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition-colors">
          <span>📘</span>
          <span class="text-sm">Facebook</span>
        </button>
      </div>

      <!-- Sign Up Link -->
      <p class="text-center mt-6 text-gray-600">
        Don't have an account?
        <button (click)="switchToSignup()" class="text-[#1eba9b] font-semibold hover:underline">
          Sign Up
        </button>
      </p>
    </div>
  </div>
</div>
