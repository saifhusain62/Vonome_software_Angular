<div *ngIf="showPopup" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-black bg-opacity-50 backdrop-blur-sm"
    (click)="closePopup()"
  ></div>

  <!-- Popup -->
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden max-h-screen overflow-y-auto">
    <!-- Header -->
    <div class="bg-gradient-to-r from-green-500 to-green-700 px-6 py-8 text-center">
      <span class="text-5xl">📝</span>
      <h2 class="text-2xl font-bold text-white mt-4">Create Account</h2>
      <p class="text-green-200 mt-2">Join us today!</p>
    </div>

    <!-- Close Button -->
    <button
      (click)="closePopup()"
      class="absolute top-4 right-4 text-white hover:text-gray-200 text-2xl"
    >
      ✕
    </button>

    <!-- Form -->
    <div class="px-6 py-8">
      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
        {{ errorMessage }}
      </div>

      <!-- Full Name -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">Full Name</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">👤</span>
          <input
            type="text"
            [(ngModel)]="name"
            placeholder="Enter your full name"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">Email Address</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">📧</span>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="Enter your email"
            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">Password</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Create a password"
            class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-3 text-gray-400 hover:text-gray-600"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">Confirm Password</label>
        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">🔒</span>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            placeholder="Confirm your password"
            class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
          />
          <button
            type="button"
            (click)="toggleConfirmPasswordVisibility()"
            class="absolute right-3 top-3 text-gray-400 hover:text-gray-600"
          >
            {{ showConfirmPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Terms Checkbox -->
      <div class="mb-6">
        <label class="flex items-start">
          <input
            type="checkbox"
            [(ngModel)]="agreeTerms"
            class="w-4 h-4 text-green-600 rounded mt-1"
          />
          <span class="ml-2 text-sm text-gray-600">
            I agree to the
            <a href="#" class="text-green-600 hover:underline">Terms of Service</a>
            and
            <a href="#" class="text-green-600 hover:underline">Privacy Policy</a>
          </span>
        </label>
      </div>

      <!-- Sign Up Button -->
      <button
        (click)="onSubmit()"
        class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition-all"
      >
        Create Account
      </button>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-4 text-gray-500 text-sm">OR</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Social Signup -->
      <div class="flex space-x-4">
        <button class="flex-1 flex items-center justify-center space-x-2 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition-colors">
          <span>🔵</span>
          <span class="text-sm">Google</span>
        </button>
        <button class="flex-1 flex items-center justify-center space-x-2 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition-colors">
          <span>📘</span>
          <span class="text-sm">Facebook</span>
        </button>
      </div>

      <!-- Login Link -->
      <p class="text-center mt-6 text-gray-600">
        Already have an account?
        <button (click)="switchToLogin()" class="text-green-600 font-semibold hover:underline">
          Login
        </button>
      </p>
    </div>
  </div>
</div>
