<aside class="w-64 bg-white shadow-lg h-screen fixed left-0 top-16 overflow-y-auto">
  <div class="p-4">
    <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
      <span class="mr-2">📋</span> Categories
    </h2>
    <ul class="space-y-1">
      <li *ngFor="let category of categories">
        <button
          (click)="selectCategory(category.name)"
          [class]="selectedCategory === category.name
            ? 'w-full flex items-center justify-between px-4 py-3 rounded-lg bg-blue-600 text-white'
            : 'w-full flex items-center justify-between px-4 py-3 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors'"
        >
          <span class="flex items-center">
            <span class="mr-3 text-xl">{{ category.icon }}</span>
            <span class="font-medium">{{ category.name }}</span>
          </span>
          <span
            [class]="selectedCategory === category.name
              ? 'bg-white text-blue-600 text-xs px-2 py-1 rounded-full'
              : 'bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full'"
          >
            {{ category.count }}
          </span>
        </button>
      </li>
    </ul>
  </div>

  <!-- Sidebar Footer -->
  <div class="p-4 border-t mt-4">
    <div class="bg-gradient-to-r from-green-400 to-green-600 rounded-lg p-4 text-white">
      <h3 class="font-bold mb-2">🎉 Special Offer!</h3>
      <p class="text-sm mb-3">Get 20% off on your first order</p>
      <button class="w-full bg-white text-green-600 font-semibold py-2 rounded-lg hover:bg-green-50 transition-colors">
        Shop Now
      </button>
    </div>
  </div>
</aside>
